# 服务器部署：复制 .env.example -> .env 后执行 docker compose up -d
# API: http://主机:8000  Streamlit: http://主机:8501
# 生产请在前面加 Nginx/Caddy 做 HTTPS 与反代（见 deploy/nginx-example.conf）

services:
  agent-api:
    build: .
    image: ecommerce-cs-agent:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CHECKPOINT_DB: /data/checkpoints.sqlite
      LONG_MEMORY_DB: /data/long_memory.sqlite
      CHROMA_DIR: /data/chroma
    volumes:
      - agent-data:/data
      # 可选：挂载仓库 data 目录（含商品/订单 JSON），默认已打进镜像
      # - ./data:/app/data:ro
    ports:
      - "8000:8000"
    command: >
      uvicorn apps.api_server:app
      --host 0.0.0.0
      --port 8000
      --workers 1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  agent-ui:
    build: .
    image: ecommerce-cs-agent:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CHECKPOINT_DB: /data/checkpoints.sqlite
      LONG_MEMORY_DB: /data/long_memory.sqlite
      CHROMA_DIR: /data/chroma
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
      STREAMLIT_SERVER_PORT: "8501"
    volumes:
      - agent-data:/data
    ports:
      - "8501:8501"
    command: >
      streamlit run apps/streamlit_app.py
      --server.address=0.0.0.0
      --server.port=8501
      --browser.gatherUsageStats=false
    # 与 agent-api 共用 agent-data 卷；界面不依赖 HTTP API，二者可同时对外提供服务

volumes:
  agent-data:
